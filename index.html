<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Тест</title>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:700px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
}

h2{
    margin-bottom:20px;
}

button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#475569;
}

.correct{
    background:green !important;
}

.wrong{
    background:red !important;
}

#next{
    background:#22c55e;
}

.score{
    margin-top:20px;
    font-size:20px;
}

textarea{
    width:100%;
    height:200px;
    margin-bottom:20px;
    border-radius:10px;
    padding:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Тест</h1>

<textarea id="input"></textarea>

<button onclick="loadQuestions()">
Загрузить вопросы
</button>

<hr>

<h2 id="question"></h2>

<div id="answers"></div>

<button id="next" onclick="nextQuestion()">
Следующий
</button>

<div class="score" id="score">
Счет: 0
</div>

</div>

<script>

let questions = [];

let current = 0;
let score = 0;

function loadQuestions(){

const text =
document.getElementById("input").value;

const blocks =
text.split("+++++");

questions = [];

blocks.forEach(block=>{

let parts =
block.split("=====")
.map(x=>x.trim())
.filter(x=>x);

if(parts.length >= 5){

questions.push({
question: parts[0],
answers: [
parts[1],
parts[2],
parts[3],
parts[4]
],
correct:0
});

}

});

current = 0;
score = 0;

showQuestion();

}

function showQuestion(){

if(questions.length === 0) return;

let q = questions[current];

document.getElementById("question").innerText =
q.question;

let html = "";

q.answers.forEach((a,index)=>{

html += `
<button onclick="checkAnswer(this,${index})">
${a}
</button>
`;

});

document.getElementById("answers").innerHTML =
html;

}

function checkAnswer(btn,index){

let q = questions[current];

if(index === q.correct){

btn.classList.add("correct");

score++;

document.getElementById("score").innerText =
"Счет: " + score;

}else{

btn.classList.add("wrong");

}

}

function nextQuestion(){

current++;

if(current >= questions.length){

alert("Тест завершен");

current = 0;

}

showQuestion();

}

</script>

</body>
</html>
