<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест по религиоведению</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:18px;
  margin-top:20px;
}

.hidden{display:none}

input{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:none;
  font-size:18px;
  margin-top:10px;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover{background:#1d4ed8}

.layout{
  display:grid;
  grid-template-columns:1fr 260px;
  gap:20px;
}

.answer{
  width:100%;
  margin-top:12px;
  background:#334155;
  text-align:left;
}

.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}

.top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:20px;
}

.nav-buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.nav-buttons button{
  width:100%;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

.num{
  background:#334155;
  padding:12px;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
}

.num.active{background:#2563eb}
.num.done{background:#16a34a}
.num.wrongnum{background:#dc2626}

.result-item{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-top:12px;
}

@media(max-width:800px){
  .layout{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<h1>Тест по религиоведению</h1>

<div class="card" id="loginBox">
  <h2>Введите имя</h2>
  <input id="studentName" placeholder="Ваше имя">
  <br><br>
  <button onclick="startQuiz()">Начать тест — 25 вопросов</button>
</div>

<div id="quizBox" class="hidden layout">

  <div class="card">
    <div class="top">
      <div id="nameBox"></div>
      <div id="timer">30:00</div>
      <div id="progress"></div>
    </div>

    <h2 id="question"></h2>
    <div id="answers"></div>

    <div class="nav-buttons">
      <button onclick="prevQuestion()">Назад</button>
      <button onclick="nextQuestion()">Следующий</button>
    </div>
  </div>

  <div class="card">
    <h3>Вопросы</h3>
    <div class="grid" id="questionGrid"></div>
  </div>

</div>

<div class="card hidden" id="resultBox">
  <h2>Результат</h2>
  <h3 id="finalResult"></h3>

  <h3>Правильные ответы</h3>
  <div id="correctList"></div>

  <h3>Неправильные ответы</h3>
  <div id="wrongList"></div>

  <br>
  <button onclick="location.reload()">Пройти заново</button>
</div>

</div>

<script>
let allQuestions = [];
let questions = [];
let current = 0;
let answers = [];
let timer;
let timeLeft = 30 * 60;

fetch("questions.txt")
.then(r => r.text())
.then(text => {
  const blocks = text.split("+++++");

  blocks.forEach(block => {
    let parts = block.split("=====")
      .map(x => x.trim())
      .filter(x => x.length > 0);

    if(parts.length >= 5){
      allQuestions.push({
        question: parts[0],
        answers: [parts[1], parts[2], parts[3], parts[4]],
        correct: parts[1]
      });
    }
  });
});

function startQuiz(){
  let name = document.getElementById("studentName").value.trim();

  if(!name){
    alert("Введите имя");
    return;
  }

  questions = [...allQuestions]
    .sort(() => Math.random() - 0.5)
    .slice(0,25);

  answers = Array(25).fill(null);

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("quizBox").classList.remove("hidden");
  document.getElementById("nameBox").innerText = "Имя: " + name;

  createGrid();
  showQuestion();
  startTimer();
}

function startTimer(){
  timer = setInterval(() => {
    timeLeft--;

    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;

    document.getElementById("timer").innerText =
      String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

    if(timeLeft <= 0){
      clearInterval(timer);
      finishQuiz();
    }
  },1000);
}

function createGrid(){
  let html = "";

  for(let i=0;i<25;i++){
    html += `<div class="num" id="num${i}" onclick="goToQuestion(${i})">${i+1}</div>`;
  }

  document.getElementById("questionGrid").innerHTML = html;
}

function showQuestion(){
  let q = questions[current];

  document.getElementById("progress").innerText =
    `Вопрос ${current + 1}/25`;

  document.getElementById("question").innerText = q.question;

  let mixed = q.answers
    .map(a => ({text:a, correct:a === q.correct}))
    .sort(() => Math.random() - 0.5);

  let html = "";

  mixed.forEach(ans => {
    let selected = answers[current] === ans.text;
    let cls = "answer";

    if(selected){
      cls += ans.correct ? " correct" : " wrong";
    }

    html += `
      <button class="${cls}" onclick="chooseAnswer('${escapeText(ans.text)}')">
        ${ans.text}
      </button>
    `;
  });

  document.getElementById("answers").innerHTML = html;
  updateGrid();
}

function escapeText(text){
  return text.replace(/'/g,"\\'");
}

function chooseAnswer(answer){
  answers[current] = answer;
  showQuestion();
}

function nextQuestion(){
  if(current < 24){
    current++;
    showQuestion();
  }else{
    finishQuiz();
  }
}

function prevQuestion(){
  if(current > 0){
    current--;
    showQuestion();
  }
}

function goToQuestion(index){
  current = index;
  showQuestion();
}

function updateGrid(){
  for(let i=0;i<25;i++){
    let el = document.getElementById("num"+i);
    el.className = "num";

    if(i === current) el.classList.add("active");

    if(answers[i]){
      if(answers[i] === questions[i].correct){
        el.classList.add("done");
      }else{
        el.classList.add("wrongnum");
      }
    }
  }
}

function finishQuiz(){
  clearInterval(timer);

  document.getElementById("quizBox").classList.add("hidden");
  document.getElementById("resultBox").classList.remove("hidden");

  let correctCount = 0;
  let correctHTML = "";
  let wrongHTML = "";

  questions.forEach((q,i) => {
    let user = answers[i];

    if(user === q.correct){
      correctCount++;

      correctHTML += `
        <div class="result-item">
          <b>${i+1}. ${q.question}</b>
          <p style="color:lightgreen">Правильный ответ: ${q.correct}</p>
        </div>
      `;
    }else{
      wrongHTML += `
        <div class="result-item">
          <b>${i+1}. ${q.question}</b>
          <p style="color:#f87171">Ваш ответ: ${user ? user : "Не отвечено"}</p>
          <p style="color:lightgreen">Правильный ответ: ${q.correct}</p>
        </div>
      `;
    }
  });

  document.getElementById("finalResult").innerText =
    `Вы набрали ${correctCount} из 25`;

  document.getElementById("correctList").innerHTML =
    correctHTML || "<p>Нет правильных ответов</p>";

  document.getElementById("wrongList").innerHTML =
    wrongHTML || "<p>Ошибок нет 🎉</p>";
}
</script>

</body>
</html>
