<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Religious Test</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  margin-top:20px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#475569;
}

.correct{
  background:green !important;
}

.wrong{
  background:red !important;
}

.hidden{
  display:none;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.result-item{
  background:#111827;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Тест по религиоведению</h1>

<div class="card" id="startBox">

<h2>Выберите количество вопросов</h2>

<button onclick="startQuiz(25)">25 вопросов</button>
<button onclick="startQuiz(50)">50 вопросов</button>
<button onclick="startQuiz(100)">100 вопросов</button>
<button onclick="startQuiz(9999)">Все вопросы</button>

</div>

<div class="card hidden" id="quizBox">

<div class="top">
<div id="progress"></div>
<div id="score"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<button onclick="nextQuestion()">
Следующий
</button>

</div>

<div class="card hidden" id="resultBox">

<h2>Результат</h2>

<div id="finalScore"></div>

<h3>Ошибки:</h3>

<div id="mistakes"></div>

</div>

</div>

<script>

let allQuestions = [];
let questions = [];

let current = 0;
let score = 0;
let answered = false;

let mistakes = [];

fetch("questions.txt")
.then(r=>r.text())
.then(text=>{

const blocks = text.split("+++++");

blocks.forEach(block=>{

let parts = block.split("=====")
.map(x=>x.trim())
.filter(x=>x);

if(parts.length >= 5){

allQuestions.push({

question: parts[0],

answers:[
parts[1],
parts[2],
parts[3],
parts[4]
],

correct:0

});

}

});

});

function startQuiz(count){

questions =
[...allQuestions]
.sort(()=>Math.random()-0.5)
.slice(0,count);

current = 0;
score = 0;
mistakes = [];

document.getElementById("startBox")
.classList.add("hidden");

document.getElementById("quizBox")
.classList.remove("hidden");

showQuestion();

}

function showQuestion(){

answered = false;

let q = questions[current];

document.getElementById("progress").innerText =
`Вопрос ${current+1}/${questions.length}`;

document.getElementById("score").innerText =
`Правильно: ${score}`;

document.getElementById("question").innerText =
q.question;

let mixed =
q.answers.map((a,index)=>({

text:a,
correct:index===0

})).sort(()=>Math.random()-0.5);

let html = "";

mixed.forEach(ans=>{

html += `
<button onclick="checkAnswer(this,'${ans.text}',${ans.correct})">
${ans.text}
</button>
`;

});

document.getElementById("answers").innerHTML =
html;

}

function checkAnswer(btn,text,isCorrect){

if(answered) return;

answered = true;

if(isCorrect){

btn.classList.add("correct");

score++;

}else{

btn.classList.add("wrong");

document.querySelectorAll("#answers button")
.forEach(b=>{

if(b.innerText === questions[current].answers[0]){

b.classList.add("correct");

}

});

mistakes.push({

question:questions[current].question,

your:text,

correct:questions[current].answers[0]

});

}

document.getElementById("score").innerText =
`Правильно: ${score}`;

}

function nextQuestion(){

current++;

if(current >= questions.length){

finishQuiz();

return;

}

showQuestion();

}

function finishQuiz(){

document.getElementById("quizBox")
.classList.add("hidden");

document.getElementById("resultBox")
.classList.remove("hidden");

document.getElementById("finalScore").innerHTML =
`<h1>${score} / ${questions.length}</h1>`;

let html = "";

mistakes.forEach(m=>{

html += `

<div class="result-item">

<p><b>Вопрос:</b> ${m.question}</p>

<p style="color:red">
<b>Ваш ответ:</b> ${m.your}
</p>

<p style="color:lightgreen">
<b>Правильный:</b> ${m.correct}
</p>

</div>

`;

});

document.getElementById("mistakes").innerHTML =
html;

}

</script>

</body>
</html>
