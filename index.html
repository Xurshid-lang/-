<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Religious Test</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  min-height:100vh;
}

.app{
  max-width:900px;
  margin:auto;
  padding:25px;
}

.card{
  background:#111827;
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
  text-align:center;
}

textarea{
  width:100%;
  height:180px;
  border-radius:15px;
  padding:15px;
  font-size:15px;
}

.btn{
  width:100%;
  padding:15px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:17px;
  cursor:pointer;
  background:#2563eb;
  color:white;
}

.answer{
  background:#1f2937;
  text-align:left;
}

.answer:hover{
  background:#374151;
}

.correct{
  background:#16a34a !important;
}

.wrong{
  background:#dc2626 !important;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  color:#cbd5e1;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="app">
  <h1>Тест по религиоведению</h1>

  <div class="card" id="startBox">
    <h2>Вставь вопросы из блокнота</h2>
    <textarea id="input" placeholder="Вставь сюда весь текст из Din rus.txt"></textarea>

    <button class="btn" onclick="loadQuestions()">Начать тест</button>
  </div>

  <div class="card hidden" id="quizBox">
    <div class="top">
      <div id="progress">Вопрос 1/0</div>
      <div id="score">Правильно: 0</div>
    </div>

    <h2 id="question"></h2>
    <div id="answers"></div>

    <button class="btn" onclick="nextQuestion()">Следующий вопрос</button>
  </div>
</div>

<script>
let questions = [];
let current = 0;
let score = 0;
let answered = false;

function loadQuestions(){
  let text = document.getElementById("input").value;
  let blocks = text.split("+++++");

  questions = [];

  blocks.forEach(block=>{
    let parts = block.split("=====")
      .map(x=>x.trim())
      .filter(x=>x.length > 0);

    if(parts.length >= 5){
      questions.push({
        question: parts[0],
        answers: [parts[1], parts[2], parts[3], parts[4]],
        correct: 0
      });
    }
  });

  questions = questions.sort(()=>Math.random()-0.5);

  current = 0;
  score = 0;

  document.getElementById("startBox").classList.add("hidden");
  document.getElementById("quizBox").classList.remove("hidden");

  showQuestion();
}

function showQuestion(){
  answered = false;

  let q = questions[current];

  document.getElementById("progress").innerText =
    "Вопрос " + (current + 1) + "/" + questions.length;

  document.getElementById("score").innerText =
    "Правильно: " + score;

  document.getElementById("question").innerText = q.question;

  let mixed = q.answers.map((text,index)=>({
    text:text,
    correct:index === q.correct
  })).sort(()=>Math.random()-0.5);

  let html = "";

  mixed.forEach(ans=>{
    html += `
      <button class="btn answer" onclick="checkAnswer(this, ${ans.correct})">
        ${ans.text}
      </button>
    `;
  });

  document.getElementById("answers").innerHTML = html;
}

function checkAnswer(btn,isCorrect){
  if(answered) return;

  answered = true;

  if(isCorrect){
    btn.classList.add("correct");
    score++;
  }else{
    btn.classList.add("wrong");

    document.querySelectorAll(".answer").forEach(b=>{
      if(b.getAttribute("onclick").includes("true")){
        b.classList.add("correct");
      }
    });
  }

  document.getElementById("score").innerText =
    "Правильно: " + score;
}

function nextQuestion(){
  current++;

  if(current >= questions.length){
    alert("Тест завершён! Правильно: " + score + " из " + questions.length);
    location.reload();
    return;
  }

  showQuestion();
}
</script>

</body>
</html>
